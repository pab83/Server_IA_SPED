
services:

  redis:
    image: redis:7-alpine
    container_name: rpr-redis
    ports:
      - ${REDIS_PORT}:${REDIS_PORT}
    command: ["redis-server", "--appendonly", "yes",--timeout 0,--tcp-keepalive 60]
    volumes:
      - redisdata:/data
    networks:
      - rpr-net

  worker_ocr:
    build:
      context: .
      dockerfile: workers/model_ocr/Dockerfile
    # container_name: worker-ocr
    mem_limit: 32g   
    environment:
      REDIS_HOST: ${REDIS_HOST}
    volumes:
      - /home/pablo/Server_IA_SPED/demo:/demo:ro
      - /mnt/share:/data:ro
      - hf_cache:/root/.cache/huggingface
    networks:
      - rpr-net
    restart: unless-stopped


  worker_moondream:
    build:
      context: .
      dockerfile: workers/model_moondream/Dockerfile
    #container_name: worker-moondream
    environment:
      REDIS_HOST: ${REDIS_HOST}
      OMP_NUM_THREADS: 1  # Limitar el número de threads para operaciones paralelas
      MKL_NUM_THREADS: 1  #
    volumes:
      - /home/pablo/Server_IA_SPED/demo:/demo:ro
      - /mnt/share:/data:ro
    networks:
      - rpr-net
    restart: unless-stopped
  
  worker_embeddings:
    build:
      context: .
      dockerfile: workers/model_embeddings/Dockerfile
    container_name: worker-embeddings
    environment:
      REDIS_HOST: ${REDIS_HOST}
    volumes:
      - /home/pablo/Server_IA_SPED/demo:/demo:ro
      - /mnt/share:/data:ro
      - hf_cache:/root/.cache/huggingface
    networks:
      - rpr-net
    restart: unless-stopped

networks:
  rpr-net:
    driver: bridge

volumes:
  hf_cache:
  redisdata:

